# Local development stack for @hasna/identities in cloud (PURE REMOTE) mode.
#   docker compose up --build
#   docker compose run --rm identities-migrate   # apply schema first
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: identities
      POSTGRES_PASSWORD: identities
      POSTGRES_DB: identities
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identities"]
      interval: 5s
      timeout: 3s
      retries: 10

  identities-migrate:
    build: .
    command: ["bun", "dist/src/server/index.js", "migrate"]
    environment:
      HASNA_IDENTITIES_STORAGE_MODE: cloud
      HASNA_IDENTITIES_DATABASE_URL: postgres://identities:identities@postgres:5432/identities?sslmode=disable
      HASNA_IDENTITIES_API_SIGNING_KEY: dev-signing-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy

  identities-serve:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      HOST: 0.0.0.0
      HASNA_IDENTITIES_STORAGE_MODE: cloud
      HASNA_IDENTITIES_DATABASE_URL: postgres://identities:identities@postgres:5432/identities?sslmode=disable
      HASNA_IDENTITIES_API_SIGNING_KEY: dev-signing-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
